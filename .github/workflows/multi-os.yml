# GitHub-Hosted Runners

# Create a workflow with 3 jobs, each on a different OS:
# ubuntu-latest
# windows-latest
# macos-latest
# In each job, print:
# The OS name
# The runner's hostname
# The current user running the job
# Watch all 3 run in parallel

name: Multi-os Runners

on:
  workflow_dispatch:
    
jobs:
  ubuntu-job:
    runs-on: ubuntu-latest

    steps:
      

      - name: print os name
        run: echo "OS Name:${{ runner.os }}"

      - name: print hostname
        run: hostname  

      - name: print current user
        run: whoami

  windows-job:
    runs-on: windows-latest

    steps:
      

      - name: print os name
        run: echo "OS Name:${{ runner.os }}"

      - name: print hostname
        run: hostname

      - name: print current user
        run: whoami

  mac-job:

    runs-on: macos-latest

    steps:
      

      - name: print os name
        run: echo "OS Name:${{ runner.os }}"

      - name: print hostname
        run: hostname

      - name: print current user
        run: whoami
                                  